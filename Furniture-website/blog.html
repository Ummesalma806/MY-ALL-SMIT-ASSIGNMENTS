<!doctype html>
<html lang="en">

    <link

  <body>

        <nav class="navbar navbar-expand-lg mx-auto p-3">

              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent"
              aria-controls="navbarSupportedContent"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-4">
                <li class="nav-item">
                  <a
                    class="nav-link active"
                    aria-current="page"
                    href="./index.html"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="./shop.html">Shop</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="./contact.html">Contact</a>
                </li>
              </ul>
              <ul class="navbar-nav gap-4">
                <li class="nav-item">
                  <img src="./assets/icon-(1).png" alt="icons" />
                </li>
                <li class="nav-item">
                  <img src="./assets/icon-(2).png" alt="icons" />
                </li>
                <li class="nav-item">
                  <img src="./assets/icon-(3).png" alt="icons" />
                </li>
                <li class="nav-item">
                  <img src="./assets/icon-(4).png" alt="icons" />
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </header>
      <main>
        <!-- hero-section -->
        <section class="mt-3">
          <div class="container">
            <div
              class="background d-flex flex-column align-items-center justify-content-center"
            >
              <div class="texxt">
                <h2 class="text-center">Blog</h2>
                <p class="text-center">Home > Blog</p>
              </div>
            </div>
          </div>
        </section>

          <a

          >
            <svg
              class="bi pe-none me-2"
              width="40"
              height="32"
              aria-hidden="true"
            >
              <use xlink:href="#bootstrap"></use>
            </svg>
            <span class="fs-4">Sidebar</span>
          </a>
          <hr />
          <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
              <a href="#" class="nav-link active" aria-current="page">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  aria-hidden="true"
                >
                  <use xlink:href="#home"></use>
                </svg>
                Home
              </a>
            </li>
            <li>
              <a href="#" class="nav-link link-body-emphasis">
                <svg
                  class="bi pe-none me-2"

                  height="16"
                  aria-hidden="true"

            </li>
            <li>
              <a href="#" class="nav-link link-body-emphasis">

            </li>
            <li>

                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  aria-hidden="true"

                  <use xlink:href="#grid"></use>

              </a>
            </li>
            <li>
              <a href="#" class="nav-link link-body-emphasis">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  aria-hidden="true"
                >
                  <use xlink:href="#people-circle"></use>
                </svg>
                Customers
              </a>

            <a

              aria-expanded="false"

                width="32"
                height="32"

              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item" href="#">Sign out</a></li>
            </ul>
          </div>
        </div>
